<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Content Repurposing Agent</title>
<meta name="description" content="Turn one YouTube URL into ranked clips, hooks, titles and SEO copy." />
<!-- Inline SVG favicon: a retention curve with one peak — the signal the app ranks on. -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%235eead4'/%3E%3Cstop offset='1' stop-color='%230d9488'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='15' fill='url(%23g)'/%3E%3Cg fill='%23052e2b'%3E%3Crect x='13' y='36' width='7' height='14' rx='3.5'/%3E%3Crect x='23' y='26' width='7' height='24' rx='3.5'/%3E%3Crect x='33' y='14' width='7' height='36' rx='3.5'/%3E%3Crect x='43' y='31' width='7' height='19' rx='3.5'/%3E%3C/g%3E%3C/svg%3E" />
<style>
  :root {
    color-scheme: dark;
    --bg: #070b0e;
    --bg-glow-1: rgba(45, 212, 191, .10);
    --bg-glow-2: rgba(56, 189, 248, .07);
    --panel: #0f161b;
    --panel-2: #141d24;
    --panel-3: #1a252e;
    --border: #223038;
    --border-soft: #1a252c;
    --text: #e8f0f2;
    --text-strong: #ffffff;
    --muted: #8ba1ab;
    --faint: #5f7480;
    --accent: #2dd4bf;
    --accent-strong: #14b8a6;
    --accent-ink: #04211f;
    --accent-soft: rgba(45, 212, 191, .12);
    --success: #34d399;
    --hot: #fbbf24;
    --hot-soft: rgba(251, 191, 36, .14);
    --danger: #f87171;
    --danger-soft: rgba(248, 113, 113, .1);
    --radius: 14px;
    --radius-sm: 9px;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px -12px rgba(0,0,0,.7);
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: light) {
    :root {
      color-scheme: light;
      --bg: #f4f7f8;
      --bg-glow-1: rgba(13, 148, 136, .10);
      --bg-glow-2: rgba(56, 189, 248, .09);
      --panel: #ffffff;
      --panel-2: #f3f7f8;
      --panel-3: #e8eff1;
      --border: #dbe4e8;
      --border-soft: #e7edf0;
      --text: #16232a;
      --text-strong: #06121a;
      --muted: #5d7580;
      --faint: #8298a3;
      --accent: #0d9488;
      --accent-strong: #0f766e;
      --accent-ink: #ffffff;
      --accent-soft: rgba(13, 148, 136, .1);
      --success: #059669;
      --hot: #b45309;
      --hot-soft: rgba(180, 83, 9, .1);
      --danger: #dc2626;
      --danger-soft: rgba(220, 38, 38, .07);
      --shadow: 0 1px 2px rgba(16,40,50,.06), 0 10px 30px -14px rgba(16,40,50,.25);
    }
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  /* Two soft light sources so the flat background has some depth. */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(70ch 50ch at 12% -10%, var(--bg-glow-1), transparent 60%),
      radial-gradient(60ch 45ch at 92% 4%, var(--bg-glow-2), transparent 55%);
  }
  .wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 40px 20px 96px; }

  /* ---------- header ---------- */
  header { display: flex; align-items: center; gap: 14px; margin-bottom: 30px; }
  .mark {
    width: 42px; height: 42px; border-radius: 12px; flex: none;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
    display: grid; place-items: center;
    box-shadow: 0 6px 18px -6px var(--accent-soft), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .mark svg { display: block; }
  header h1 {
    font-size: 21px; font-weight: 650; margin: 0; letter-spacing: -.02em; color: var(--text-strong);
  }
  header p { color: var(--muted); margin: 2px 0 0; font-size: 14px; }

  /* ---------- surfaces ---------- */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card.flush { padding: 0; overflow: hidden; }

  /* ---------- console (input) ---------- */
  .console { padding: 18px; }
  .field-group { display: flex; gap: 8px; flex-wrap: wrap; }
  input[type=text] {
    flex: 1; min-width: 240px; padding: 13px 15px;
    border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--panel-2); color: var(--text); font-size: 15px;
    font-family: inherit; transition: border-color .15s, box-shadow .15s;
  }
  input[type=text]::placeholder { color: var(--faint); }
  input[type=text]:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .filerow { display: flex; gap: 8px; align-items: center; margin-top: 9px; flex-wrap: wrap; }
  input[type=file] {
    flex: 1; min-width: 220px; font-size: 13px; color: var(--muted);
    padding: 8px 10px; border: 1px dashed var(--border); border-radius: var(--radius-sm);
    background: var(--panel-2); font-family: inherit; cursor: pointer;
  }
  input[type=file]::file-selector-button {
    border: 0; border-radius: 6px; padding: 6px 12px; margin-right: 10px;
    background: var(--panel-3); color: var(--text); font-weight: 600;
    font-size: 13px; font-family: inherit; cursor: pointer;
  }
  input[type=file]:hover { border-color: var(--accent); }

  button {
    padding: 13px 22px; border: 0; border-radius: var(--radius-sm);
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
    color: var(--accent-ink); font-weight: 650; font-size: 15px; font-family: inherit;
    cursor: pointer; letter-spacing: -.01em;
    box-shadow: 0 1px 0 rgba(255,255,255,.2) inset, 0 4px 12px -4px var(--accent-soft);
    transition: transform .12s, filter .15s, box-shadow .15s;
  }
  button:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }
  button.ghost {
    background: var(--panel-3); color: var(--text); box-shadow: none;
    border: 1px solid var(--border); font-size: 14px; padding: 10px 16px;
  }
  button.ghost:hover:not(:disabled) { border-color: var(--accent); filter: none; }

  .hint { color: var(--muted); font-size: 13px; margin-top: 13px; line-height: 1.55; }
  .hint a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-soft); }
  .hint a:hover { border-bottom-color: var(--accent); }
  .hint b { color: var(--text); font-weight: 600; }

  /* ---------- progress ---------- */
  .status { display: flex; align-items: center; gap: 12px; }
  .spinner {
    width: 17px; height: 17px; flex: none; border: 2.5px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #statusText { font-weight: 600; color: var(--text-strong); }
  .steps { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
  .step {
    font-size: 12px; padding: 5px 11px; border-radius: 20px;
    background: var(--panel-2); color: var(--faint);
    border: 1px solid var(--border-soft); transition: all .2s; white-space: nowrap;
  }
  .step.active {
    background: var(--accent-soft); color: var(--accent);
    border-color: var(--accent); font-weight: 600;
  }
  .step.done { background: transparent; color: var(--success); border-color: transparent; }
  .step.done::before { content: "✓ "; }

  /* ---------- stat tiles ---------- */
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(118px, 1fr)); gap: 1px;
           background: var(--border-soft); border: 1px solid var(--border-soft);
           border-radius: var(--radius-sm); overflow: hidden; }
  .tile { background: var(--panel); padding: 15px 12px; text-align: center; }
  .tile .n {
    font-size: 21px; font-weight: 680; color: var(--text-strong);
    letter-spacing: -.02em; font-variant-numeric: tabular-nums;
  }
  .tile .l {
    font-size: 11px; color: var(--muted); margin-top: 3px;
    text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
  }

  /* ---------- typography ---------- */
  h2 {
    font-size: 13px; margin: 30px 0 12px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .07em; font-weight: 680;
  }
  h3 { font-size: 15px; margin: 0; font-weight: 640; color: var(--text-strong); letter-spacing: -.01em; }
  .meta { color: var(--muted); font-size: 13px; }

  /* ---------- clip cards ---------- */
  .clip-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .clip-title { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .rank {
    flex: none; width: 26px; height: 26px; border-radius: 8px;
    background: var(--panel-3); color: var(--muted);
    display: grid; place-items: center; font-size: 12px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .rank.top { background: var(--accent); color: var(--accent-ink); }
  .timecode { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .badges { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .score {
    font-weight: 680; color: var(--success); font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  .pill {
    font-size: 11.5px; font-weight: 650; padding: 3px 9px; border-radius: 20px;
    background: var(--panel-3); color: var(--muted); white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .pill.hot { background: var(--hot-soft); color: var(--hot); }
  .pill.cold { background: var(--panel-3); color: var(--faint); }
  .pill.origin { background: var(--hot-soft); color: var(--hot); }

  /* Retention meter — visual echo of the replay lift. */
  /* Retention meter. Below-average replays stay deliberately quiet so the
     eye is drawn to peaks, not away from them. */
  .meter { height: 3px; border-radius: 2px; background: var(--panel-3); margin: 12px 0 0; overflow: hidden; }
  .meter i { display: block; height: 100%; border-radius: 2px; background: var(--border); }
  .meter i.hot { background: var(--hot); }

  .quote {
    border-left: 2px solid var(--accent); padding: 10px 14px; margin: 14px 0 10px;
    color: var(--text); background: var(--panel-2);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 14.5px;
  }
  .why { color: var(--muted); font-size: 13.5px; }

  .subhead {
    font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    color: var(--faint); font-weight: 680; margin: 16px 0 7px;
  }
  .hookline { margin: 5px 0; font-size: 14px; }
  .hookline b { color: var(--accent); font-weight: 640; text-transform: capitalize; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0; align-items: center; }
  .chip {
    background: var(--panel-2); border: 1px solid var(--border-soft);
    border-radius: 7px; padding: 4px 10px; font-size: 13px; color: var(--text);
  }

  /* ---------- SEO / copy ---------- */
  .sechead { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 16px; }
  .sechead:first-of-type { margin-top: 0; }
  .copy {
    font-size: 11.5px; padding: 5px 11px; border-radius: 6px;
    background: var(--panel-3); color: var(--muted); font-weight: 650;
    border: 1px solid var(--border-soft); box-shadow: none; letter-spacing: 0;
  }
  .copy:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); filter: none; }
  .copy.ok { background: var(--success); color: var(--accent-ink); border-color: transparent; }
  pre {
    background: var(--panel-2); border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm); padding: 13px; overflow-x: auto;
    white-space: pre-wrap; word-break: break-word; margin: 8px 0 0;
    font-size: 13px; font-family: var(--mono); line-height: 1.6; color: var(--text);
  }
  .titlerow {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    padding: 9px 0; border-bottom: 1px solid var(--border-soft); font-size: 14.5px;
  }
  .titlerow:last-child { border-bottom: 0; }
  .titlerow .meta { font-family: var(--mono); font-size: 12px; flex: none; }

  /* ---------- states ---------- */
  .warn { color: var(--hot); font-size: 13px; }
  .err { color: var(--danger); font-weight: 650; }
  .card.errcard { border-color: var(--danger); background: var(--danger-soft); }
  details { margin-top: 16px; }
  details .card { margin: 0; }
  summary {
    cursor: pointer; color: var(--muted); font-size: 13.5px;
    font-weight: 600; list-style: none; -webkit-user-select: none; user-select: none;
  }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "▸ "; color: var(--faint); }
  details[open] summary::before { content: "▾ "; }
  .rejrow { padding: 9px 0; border-bottom: 1px solid var(--border-soft); font-size: 13.5px; }
  .rejrow:last-child { border-bottom: 0; }

  .foot {
    text-align: center; color: var(--faint); font-size: 12.5px; margin-top: 36px;
    font-variant-numeric: tabular-nums;
  }

  @media (max-width: 600px) {
    .wrap { padding: 28px 15px 64px; }
    header h1 { font-size: 19px; }
    button { width: 100%; }
    .field-group input[type=text] { min-width: 100%; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mark" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 64 64" fill="#04211f">
        <rect x="13" y="36" width="7" height="14" rx="3.5"/>
        <rect x="23" y="26" width="7" height="24" rx="3.5"/>
        <rect x="33" y="14" width="7" height="36" rx="3.5"/>
        <rect x="43" y="31" width="7" height="19" rx="3.5"/>
      </svg>
    </div>
    <div>
      <h1>Content Repurposing Agent</h1>
      <p>One YouTube URL → ranked clips, hooks, titles &amp; SEO, via a self-critiquing agent team.</p>
    </div>
  </header>

  <div class="card console">
    <div class="field-group">
      <input id="url" type="text" placeholder="https://www.youtube.com/watch?v=…" autocomplete="off" spellcheck="false" aria-label="YouTube URL" />
      <button id="go">Generate</button>
    </div>
    <div class="filerow">
      <input id="file" type="file" accept=".srt,.txt,.json" aria-label="Transcript file" />
      <button id="goFile" class="ghost">Upload transcript</button>
    </div>
    <div class="hint">Needs a Groq key (<a href="https://console.groq.com/keys" target="_blank" rel="noopener">free</a>). On a hosted server YouTube may block URL fetching — <b>uploading a transcript always works</b>.</div>
  </div>

  <div id="progress" class="card" style="display:none">
    <div class="status">
      <div class="spinner" id="spin"></div>
      <div><span id="statusText">Starting…</span> <span class="meta" id="elapsed"></span></div>
    </div>
    <div class="steps" id="steps"></div>
  </div>

  <div id="results"></div>

  <div class="foot" id="foot"></div>
</div>

<script>
const $ = (s, el=document) => el.querySelector(s);
const el = (tag, props={}, ...kids) => {
  const n = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => k==='class'?n.className=v:(k==='html'?n.innerHTML=v:n.setAttribute(k,v)));
  kids.forEach(k => n.append(k));
  return n;
};
const esc = s => (s??'').toString().replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

const STEPS = ['coordinator','clip scout','critic','select','hooks + titles','SEO','assemble'];
let timer=null, started=0;

function renderSteps(activeIdx){
  const c = $('#steps'); c.innerHTML='';
  STEPS.forEach((s,i)=>{
    const cls = i<activeIdx ? 'step done' : (i===activeIdx ? 'step active' : 'step');
    c.append(el('span',{class:cls},s));
  });
}

function tick(){ $('#elapsed').textContent = `· ${((Date.now()-started)/1000).toFixed(0)}s`; }

async function copy(text, btn){
  try { await navigator.clipboard.writeText(text); const o=btn.textContent; btn.textContent='Copied'; btn.classList.add('ok');
    setTimeout(()=>{btn.textContent=o; btn.classList.remove('ok');},1200);
  } catch(e){ btn.textContent='Copy failed'; }
}
function copyBtn(label, text){
  const b = el('button',{class:'copy'}, label);
  b.onclick = ()=>copy(text, b);
  return b;
}

function setBusy(b){ $('#go').disabled=b; $('#goFile').disabled=b; }

function beginProgress(label){
  $('#results').innerHTML='';
  $('#spin').style.display='';
  $('#progress').style.display='block'; $('#statusText').textContent=label;
  $('#statusText').className='';
  renderSteps(0); started=Date.now(); clearInterval(timer); timer=setInterval(tick,250);
}

async function start(){
  const url = $('#url').value.trim();
  if(!url){ $('#url').focus(); return; }
  setBusy(true); beginProgress('Submitting…');
  let jobId;
  try {
    const r = await fetch('/process', {method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({video_url:url})});
    const j = await r.json();
    if(!r.ok){ throw new Error(j.detail || 'request failed'); }
    jobId = j.job_id;
    if(j.deduplicated){ $('#statusText').textContent='Found cached result…'; }
  } catch(e){ return fail(e.message); }
  poll(jobId);
}

async function startFile(){
  const f = $('#file').files[0];
  if(!f){ $('#file').focus(); return; }
  setBusy(true); beginProgress('Uploading transcript…');
  let jobId;
  try {
    const fd = new FormData(); fd.append('file', f);
    const r = await fetch('/process', {method:'POST', body: fd});
    const j = await r.json();
    if(!r.ok){ throw new Error(j.detail || 'request failed'); }
    jobId = j.job_id;
  } catch(e){ return fail(e.message); }
  poll(jobId);
}

let pollN=0;
async function poll(jobId){
  try {
    const r = await fetch('/jobs/'+jobId);
    const j = await r.json();
    if(j.status==='done'){ clearInterval(timer); return done(j); }
    if(j.status==='failed'){ clearInterval(timer); return fail(j.error||'job failed'); }
    // The API reports only queued/running/done, so this indicator is an
    // estimate, not real node progress. Two rules keep it from lying:
    // it advances slowly, and it stops one step short of the end — pinning it
    // on the final step makes a still-running job look frozen.
    pollN++;
    const secs = (Date.now() - started) / 1000;
    $('#statusText').textContent =
        j.status !== 'running' ? 'Queued…'
      : secs > 120 ? 'Still working — long videos can take several minutes…'
      : secs > 40  ? 'Analyzing transcript…'
      : 'Working…';
    renderSteps(Math.min(STEPS.length - 2, 1 + Math.floor(pollN / 3)));
    setTimeout(()=>poll(jobId), 2500);
  } catch(e){ setTimeout(()=>poll(jobId), 3000); }
}

function fail(msg){
  $('#spin').style.display='none';
  $('#statusText').innerHTML = '<span class="err">Failed</span>';
  $('#steps').innerHTML='';
  $('#results').innerHTML = `<div class="card errcard">⚠️ ${esc(msg)}</div>`;
  setBusy(false);
}

function clipCard(c){
  const card = el('div',{class:'card'});

  const head = el('div',{class:'clip-head'});
  const left = el('div',{class:'clip-title'});
  left.append(el('span',{class: c.rank===1 ? 'rank top' : 'rank'}, String(c.rank)));
  left.append(el('span',{class:'timecode'}, `${c.start}–${c.end}`));
  left.append(el('span',{class:'meta'}, `${Math.round(c.duration_s)}s`));
  head.append(left);

  const badges = el('div',{class:'badges'});
  if (c.origin === 'heatmap') {
    badges.append(el('span',{class:'pill origin', title:'Found from YouTube’s most-replayed curve'}, '🔥 most replayed'));
  }
  if (c.retention_lift != null) {
    // >1 means viewers replayed this window more than the video average.
    const hot = c.retention_lift >= 1.15;
    badges.append(el('span',{
      class: hot ? 'pill hot' : 'pill cold',
      title: hot ? 'Replayed more than the video average' : 'Replayed less than the video average',
    }, `${c.retention_lift.toFixed(2)}× replays`));
  }
  badges.append(el('span',{class:'score', title:'Agent quality score'}, `${c.total_score}/30`));
  head.append(badges);
  card.append(head);

  if (c.retention_lift != null) {
    // Meter is scaled so 1.0x (average) sits at the midpoint and 2.0x fills it.
    const pct = Math.max(4, Math.min(100, (c.retention_lift / 2) * 100));
    const bar = el('div',{class:'meter'});
    bar.append(el('i',{class: c.retention_lift >= 1.15 ? 'hot' : '', style:`width:${pct}%`}));
    card.append(bar);
  }

  card.append(el('div',{class:'quote'}, c.transcript_text));
  card.append(el('div',{class:'why'}, c.reason_chosen));

  if(c.hooks?.length){
    card.append(el('div',{class:'subhead'},'Hooks'));
    c.hooks.forEach(x=> card.append(el('div',{class:'hookline', html:`<b>${esc(x.style)}:</b> ${esc(x.text)}`})));
  }
  if(c.titles?.length){
    card.append(el('div',{class:'subhead'},'Titles'));
    const t = el('div',{class:'tag-list'});
    c.titles.forEach(x=> t.append(el('span',{class:'chip'}, x)));
    card.append(t);
  }
  if(c.thumbnail_text?.length){
    card.append(el('div',{class:'subhead'},'Thumbnail text'));
    const t = el('div',{class:'tag-list'});
    c.thumbnail_text.forEach(x=> t.append(el('span',{class:'chip'}, x)));
    card.append(t);
  }
  return card;
}

function seoBlock(seo){
  const card = el('div',{class:'card'});
  const mk = (label, text) => {
    const head = el('div',{class:'sechead'});
    head.append(el('h3',{}, label));
    head.append(copyBtn('Copy', text));
    card.append(head);
    card.append(el('pre',{}, text));
  };
  mk('Description', seo.description_md);
  mk('Tags', (seo.tags||[]).join(', '));
  mk('Hashtags', (seo.hashtags||[]).join(' '));
  mk('Shorts caption', seo.shorts_caption);
  mk('Reels caption', seo.reels_caption);
  return card;
}

function done(job){
  $('#spin').style.display='none';
  $('#statusText').innerHTML='<span style="color:var(--success)">Done</span>';
  renderSteps(STEPS.length); setBusy(false);
  const p = job.result; const res = $('#results'); res.innerHTML='';
  if(!p){ res.innerHTML='<div class="card">No package produced.</div>'; return; }

  const cr = p.critique||{}, cost=p.cost||{};
  const tiles = el('div',{class:'card'});
  const grid = el('div',{class:'tiles'});
  const addTile=(n,l)=>{ const t=el('div',{class:'tile'}); t.append(el('div',{class:'n'},String(n))); t.append(el('div',{class:'l'},l)); grid.append(t); };
  addTile(`${cr.approved??0}/${cr.proposed??0}`,'approved');
  addTile(cr.rounds??0,'critique rounds');
  addTile((cost.total_tokens??0).toLocaleString(),'tokens');
  addTile('$'+(cost.total_cost_usd??0).toFixed(4),'cost');
  tiles.append(grid);
  if(p.warnings?.length) tiles.append(el('div',{class:'warn',style:'margin-top:12px'}, '⚠️ '+p.warnings.join('; ')));
  res.append(tiles);

  if(p.main_video_titles?.length){
    const c = el('div',{class:'card'});
    const head=el('div',{class:'sechead'});
    head.append(el('h3',{},'Main video titles'));
    head.append(copyBtn('Copy all', p.main_video_titles.join('\n')));
    c.append(head);
    p.main_video_titles.forEach(t=>{
      const row=el('div',{class:'titlerow'});
      row.append(el('span',{}, t)); row.append(el('span',{class:'meta'}, `${t.length} ch`));
      c.append(row);
    });
    res.append(c);
  }

  res.append(el('h2',{},`Clips (${(p.approved_clips||[]).length})`));
  (p.approved_clips||[]).forEach(c=> res.append(clipCard(c)));

  if(p.seo){ res.append(el('h2',{},'SEO — copy & paste')); res.append(seoBlock(p.seo)); }

  if(p.rejected_clips?.length){
    const d = el('details',{});
    const inner = el('div',{class:'card'});
    d.append(el('summary',{}, `Rejected / dropped clips (${p.rejected_clips.length})`));
    p.rejected_clips.forEach(r=>{
      inner.append(el('div',{class:'rejrow',
        html:`<b>${esc(r.clip_id)}</b> <span class="meta">${esc(r.start)}–${esc(r.end)}</span> — <span class="warn">${esc(r.verdict)}</span>: ${esc((r.reasons||[]).join('; '))}`}));
    });
    d.append(inner);
    res.append(d);
  }
  loadStats();
}

async function loadStats(){
  try {
    const s = await (await fetch('/stats')).json();
    if(s.videos_processed!=null){
      const parts = [`${s.videos_processed} videos processed`];
      if(s.approval_rate!=null) parts.push(`${Math.round(s.approval_rate*100)}% approval rate`);
      if(s.avg_cost_per_video_usd!=null) parts.push(`~$${s.avg_cost_per_video_usd.toFixed(4)}/video`);
      $('#foot').textContent = parts.join('  ·  ');
    }
  } catch(e){}
}

$('#go').onclick = start;
$('#goFile').onclick = startFile;
$('#url').addEventListener('keydown', e=>{ if(e.key==='Enter') start(); });
loadStats();
</script>
</body>
